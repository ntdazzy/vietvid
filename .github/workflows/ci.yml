name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vietvid_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PYTHONUTF8: "1"
      # Migrations chạy bằng owner (postgres); app/test nối bằng role non-superuser (RLS mới siết).
      OWNER_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/vietvid_test
      APP_URL: postgresql+psycopg2://vietvid_app:app@localhost:5432/vietvid_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations (as owner)
        run: VIETVID_DATABASE_URL="$OWNER_URL" python -m alembic upgrade head

      - name: Create non-superuser app role + grants
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d vietvid_test <<'SQL'
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='vietvid_app') THEN
              CREATE ROLE vietvid_app LOGIN PASSWORD 'app';
            END IF;
          END $$;
          GRANT CONNECT ON DATABASE vietvid_test TO vietvid_app;
          GRANT USAGE ON SCHEMA public TO vietvid_app;
          GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO vietvid_app;
          GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA public TO vietvid_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO vietvid_app;
          SQL

      - name: Run tests (real-op, RLS enforced via non-superuser role)
        run: VIETVID_DATABASE_URL="$APP_URL" python -m pytest tests -p no:cacheprovider

      - name: Lint (ruff) — advisory
        continue-on-error: true
        run: ruff check app_api tests
