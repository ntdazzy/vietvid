# VietVid infra — M1+ (M0 chỉ cần Python để chạy engine CLI).
# Postgres (ví ACID + RLS), Redis (Arq queue), MinIO (S3-compatible cho dev thay R2).
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: vietvid
      POSTGRES_PASSWORD: vietvid
      POSTGRES_DB: vietvid
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vietvid"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: vietvid
      MINIO_ROOT_PASSWORD: vietvidsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
